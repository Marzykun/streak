name: Daily commit

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update activity log
        run: |
          mkdir -p log
          date -u +"%Y-%m-%dT%H:%M:%SZ" >> log/activity.log

      - name: Commit and push if changed
        run: |
          git config user.name "Marzykun"
          git config user.email "126388970+Marzykun@users.noreply.github.com"
          git add log/activity.log
          git diff --quiet --cached || git commit -m "Daily activity log update"
          git push
